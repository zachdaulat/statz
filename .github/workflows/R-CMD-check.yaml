on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

jobs:
  R-CMD-check:
    # Testing on the latest Ubuntu runner is the standard baseline
    runs-on: ubuntu-latest 
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install libclang (for extendr bindgen)
        run: sudo apt-get install -y libclang-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Sets up aggressive caching for the Cargo registry and target/ directory
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/rust -> target

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      # Runs the R wrappers, which will invoke `cargo build` for the FFI
      # (This build is now blazingly fast because of the Swatinem cache!)
      - name: Check R package
        uses: r-lib/actions/check-r-package@v2
        with:
          error-on: '"error"'
          